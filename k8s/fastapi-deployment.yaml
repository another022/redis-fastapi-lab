apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  labels:
    app: fastapi
spec:
  replicas: 2            # 跑 2 个副本,体会负载分布和高可用
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: redis-fastapi:0.1.0
          imagePullPolicy: IfNotPresent   # 关键:用本地加载的镜像,别去远程拉
          ports:
            - containerPort: 8000
          env:
            # 从 ConfigMap 注入 host 和 port
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_PORT
            # 从 Secret 注入密码
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD